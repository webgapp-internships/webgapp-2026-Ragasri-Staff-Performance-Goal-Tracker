<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .image{
            display:flex;
            gap: 20px;
        }
        .image1{
            border: 3px solid black;
        }
        .image2{
            border: 3px solid black;
            grid-row: auto;
        }
        .image3{
            border: 3px solid black;
        }
        @media(max-width:500px){
            body{
              background-color: indianred;
              grid-column:span;
            }
        }
    </style>
<body>
    <h1>Image gallery</h1>
    <p>Resize the browser window to see the responsive effect</p>
    <div class="image">
        <div class="image1">
            <img src="./img1.jpg" style="height:150px; width: 270px;">
            <h3 style="text-align: center;">sun set</h3>
        </div>
        <div class="image2">
            <img src="./img2.jpg" style="height:150px; width: 270px;">
            <h3 style="text-align: center;">flowers</h3>
        </div>
        <div class="image3">
            <img src="./img3.jpg" style="height:150px; width: 270px;">
            <h3  style="text-align: center;">monsoon</h3>
        </div>
    </div>
</body>
</html>
