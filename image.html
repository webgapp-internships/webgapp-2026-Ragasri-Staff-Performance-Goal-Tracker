        }

            body{

            }
            p{
                font-size:10px;
            }

<body>

    <div class="image">

            <h3>sun set</h3>
        </div>
        <div class="image2">
            <img src="./image-html/img2.jpg" style="height:150px; width: 270px;">
            <h3>flowers</h3>
        </div>
        <div class="image3">

        </div>

</body>
</html>
